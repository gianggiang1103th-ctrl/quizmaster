
<!DOCTYPE html>
<html>
<head>
  <title>QuizMaster</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>QuizMaster</h2>
<select id="topic" class="form-select"></select>
<button class="btn btn-primary mt-2" onclick="loadQuiz()">Làm bài</button>

<button class="btn btn-success mt-3" onclick="submitQuiz()">Nộp bài</button>
<h4 id="result"></h4>
<script src="app.js"></script>
</body>
</html>
